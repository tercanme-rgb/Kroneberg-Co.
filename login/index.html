<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign In</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f5f5f5;
margin:0;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.box{
background:white;
padding:40px;
width:420px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
margin-top:0;
font-size:26px;
}

p{
color:#666;
margin-bottom:30px;
}

label{
display:block;
font-size:14px;
margin-bottom:6px;
}

input{
width:100%;
padding:12px;
margin-bottom:18px;
border-radius:6px;
border:1px solid #ddd;
font-size:14px;
}

button{
width:100%;
padding:14px;
background:black;
color:white;
border:none;
border-radius:6px;
font-size:15px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.signup{
margin-top:20px;
font-size:14px;
text-align:center;
}

.signup a{
color:black;
font-weight:bold;
text-decoration:none;
}

</style>

</head>

<body>

<div class="box">

<h1>Sign in</h1>

<p>Access your niche research dashboard.</p>

<form>

<label>Email</label>
<input type="email" placeholder="your@email.com" required>

<label>Password</label>
<input type="password" placeholder="Your password" required>

<button>Sign In</button>

</form>

<div class="signup">
Don't have an account?
<a href="/signup">Create one</a>
</div>

</div>

</body>
</html>
