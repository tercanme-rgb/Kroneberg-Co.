<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Complete Setup</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#0b0f14;
      --card:#111823;
      --line:rgba(255,255,255,.08);
      --text:#f5f7fb;
      --muted:#9aa4b2;
      --accent:#c8a96b;
      --ok:#1f9d55;
      --err:#d64545;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .card{
      width:100%;
      max-width:560px;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:28px;
      box-shadow:0 10px 40px rgba(0,0,0,.25);
    }
    h1{
      margin:0 0 10px;
      font-size:30px;
      line-height:1.1;
    }
    p{
      margin:0 0 18px;
      color:var(--muted);
      line-height:1.55;
    }
    .row{margin:0 0 14px}
    label{
      display:block;
      margin:0 0 8px;
      font-size:13px;
      color:var(--muted);
    }
    input{
      width:100%;
      padding:14px 16px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#0d141d;
      color:var(--text);
      outline:none;
      font-size:15px;
    }
    input[disabled]{opacity:.7}
    button{
      width:100%;
      border:0;
      border-radius:12px;
      padding:14px 16px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      background:var(--accent);
      color:#111;
      margin-top:8px;
    }
    .status{
      margin-top:16px;
      padding:12px 14px;
      border-radius:12px;
      display:none;
      font-size:14px;
      line-height:1.5;
    }
    .status.show{display:block}
    .status.ok{background:rgba(31,157,85,.12); color:#c9f2d7; border:1px solid rgba(31,157,85,.35)}
    .status.err{background:rgba(214,69,69,.12); color:#ffd5d5; border:1px solid rgba(214,69,69,.35)}
    .meta{
      margin-top:16px;
      font-size:12px;
      color:var(--muted);
      word-break:break-word;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Complete your setup</h1>
    <p>Your account is almost ready. Confirm your details below to continue.</p>

    <div class="row">
      <label>Email</label>
      <input id="email" type="email" disabled />
    </div>

    <div class="row">
      <label>Your referral code</label>
      <input id="referral_code" type="text" disabled />
    </div>

    <div class="row">
      <label>Referred by</label>
      <input id="referred_by_code" type="text" disabled />
    </div>

    <button id="finishBtn">Continue to Vault</button>

    <div id="status" class="status"></div>
    <div id="meta" class="meta"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://btiwdulcqtvkdupsotnx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ0aXdkdWxjcXR2a2R1cHNvdG54Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NzY2NjcsImV4cCI6MjA5MDM1MjY2N30.RawdFhi84Zq95eZ29w8QwXPcBT9VDffFcHMB3fAzITA';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const emailEl = document.getElementById('email');
    const referralCodeEl = document.getElementById('referral_code');
    const referredByCodeEl = document.getElementById('referred_by_code');
    const statusEl = document.getElementById('status');
    const metaEl = document.getElementById('meta');
    const finishBtn = document.getElementById('finishBtn');

    let currentUser = null;
    let incomingRef = '';

    function showStatus(message, type = 'ok') {
      statusEl.className = `status show ${type}`;
      statusEl.textContent = message;
    }

    function makeOwnReferralCode(user) {
      const base =
        (user.email || 'member')
          .split('@')[0]
          .replace(/[^a-zA-Z0-9]/g, '')
          .toUpperCase()
          .slice(0, 6) || 'MEMBER';

      const tail = (user.id || '')
        .replace(/-/g, '')
        .slice(0, 6)
        .toUpperCase();

      return `${base}-${tail}`;
    }

    async function loadUser() {
      const { data, error } = await supabaseClient.auth.getUser();

      if (error || !data?.user) {
        showStatus('No active user session found. Please sign in again.', 'err');
        finishBtn.disabled = true;
        return null;
      }

      return data.user;
    }

    async function saveProfile(user, refCodeFromUrl) {
      const ownReferralCode = makeOwnReferralCode(user);

      const payload = {
        id: user.id,
        email: user.email,
        referral_code: ownReferralCode,
        referred_by_code: refCodeFromUrl || null
      };

      const { error } = await supabaseClient
        .from('profiles')
        .upsert(payload, { onConflict: 'id' });

      if (error) throw error;

      return payload;
    }

    async function init() {
      try {
        const params = new URLSearchParams(window.location.search);
        incomingRef = (params.get('ref') || '').trim().toUpperCase();

        currentUser = await loadUser();
        if (!currentUser) return;

        const saved = await saveProfile(currentUser, incomingRef);

        emailEl.value = saved.email || '';
        referralCodeEl.value = saved.referral_code || '';
        referredByCodeEl.value = saved.referred_by_code || '';

        metaEl.textContent = `User ID: ${currentUser.id}`;
        showStatus('Setup completed successfully. Your profile has been saved.', 'ok');
      } catch (err) {
        console.error(err);
        showStatus(err.message || 'Setup failed.', 'err');
        finishBtn.disabled = true;
      }
    }

    finishBtn.addEventListener('click', () => {
      window.location.href = 'vault.html';
    });

    init();
  </script>
</body>
</html>
